name: 抓取新聞並部署網站

on:
  schedule:
    - cron: "17 */2 * * *"   # 每 2 小時（UTC），避開整點尖峰
  workflow_dispatch:          # 允許手動觸發
  push:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: update-news
  cancel-in-progress: false

jobs:
  fetch-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: 安裝套件
        run: pip install -r scripts/requirements.txt

      - name: 抓取新聞
        run: python scripts/fetch_news.py

      - name: LLM 摘要（有設定 ANTHROPIC_API_KEY 才會執行）
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/summarize.py

      - name: 提交資料更新
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "資料無變化，跳過提交。"
          else
            git commit -m "自動更新新聞資料 $(TZ=Asia/Taipei date '+%Y-%m-%d %H:%M')"
            git pull --rebase origin main
            git push
          fi

      - name: 組合網站
        run: |
          mkdir -p _site
          cp index.html archive.html _site/
          cp -r data _site/data

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
