<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>時事懶人包｜台灣熱門新聞事件追蹤</title>
<meta name="description" content="彙整台灣主要媒體報導，追蹤最受討論的新聞事件，並列各家媒體標題，提供最客觀的視角。">
<style>
:root{
  --bg:#f7f7f5;--card:#ffffff;--text:#1a1a1a;--muted:#6b6b6b;
  --line:#e5e5e0;--accent:#b3452c;--accent-bg:#fdf0ec;--link:#1a5276;
}
@media (prefers-color-scheme:dark){
  :root{--bg:#141416;--card:#1e1e21;--text:#eaeaea;--muted:#9a9a9a;
  --line:#2c2c30;--accent:#e07a5f;--accent-bg:#2a201d;--link:#7fb3d5;}
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);
  font-family:"Noto Sans TC","PingFang TC","Microsoft JhengHei",sans-serif;
  line-height:1.6}
a{color:var(--link);text-decoration:none}
a:hover{text-decoration:underline}
.wrap{max-width:860px;margin:0 auto;padding:0 16px 60px}
header{padding:28px 0 8px;display:flex;flex-wrap:wrap;align-items:baseline;gap:12px}
header h1{font-size:1.7rem;letter-spacing:.05em}
header .sub{color:var(--muted);font-size:.9rem}
nav{margin:4px 0 16px;font-size:.9rem;display:flex;gap:16px;align-items:center}
#updated{color:var(--muted);font-size:.85rem;margin-left:auto}
h2{font-size:1.15rem;margin:28px 0 12px;padding-left:10px;
  border-left:4px solid var(--accent)}
.card{background:var(--card);border:1px solid var(--line);border-radius:10px;
  padding:16px 18px;margin-bottom:14px}
.card h3{font-size:1.05rem;line-height:1.5;margin-bottom:6px}
.meta{font-size:.8rem;color:var(--muted);display:flex;flex-wrap:wrap;gap:10px;margin-bottom:8px}
.badge{background:var(--accent-bg);color:var(--accent);border-radius:20px;
  padding:1px 10px;font-weight:600}
.summary{font-size:.92rem;background:var(--accent-bg);border-radius:8px;
  padding:10px 12px;margin:8px 0}
.claims{font-size:.82rem;border-radius:8px;padding:8px 12px;margin:8px 0;
  border:1px solid var(--line)}
.claims.warn{border-color:var(--accent);color:var(--text)}
.claims .lbl{font-weight:700;color:var(--accent);margin-right:6px}
.claims.ok .lbl{color:#3a7d44}
.claims .hint{display:block;color:var(--muted);font-size:.75rem;margin-top:2px}
.analysis{font-size:.92rem;background:var(--accent-bg);border-radius:8px;
  padding:10px 12px;margin:8px 0}
.analysis .an-sec{margin:4px 0}
.analysis .an-sec p{margin:2px 0}
.analysis .lbl{font-weight:700;font-size:.8rem;color:var(--accent)}
.analysis .an-sec.single p,.analysis .an-sec.single .lbl{color:var(--muted)}
.analysis a.ref{font-size:.75rem;vertical-align:super;margin-left:1px;
  text-decoration:none}
#tagbar{display:flex;flex-wrap:wrap;gap:8px;margin:0 0 14px}
.chip{font-size:.82rem;padding:3px 12px;border-radius:20px;cursor:pointer;
  border:1px solid var(--line);background:var(--card);color:var(--muted);
  font-family:inherit}
.chip:hover{border-color:var(--accent);color:var(--accent)}
.chip.active{background:var(--accent);border-color:var(--accent);color:#fff;
  font-weight:600}
.chip .n{opacity:.7;font-size:.75rem;margin-left:3px}
.tag{font-size:.75rem;color:var(--link);cursor:pointer}
.tag:hover{text-decoration:underline}
ul.arts{list-style:none;margin-top:6px}
ul.arts li{padding:5px 0;border-top:1px dashed var(--line);
  font-size:.92rem;display:flex;gap:8px;align-items:baseline}
ul.arts li:first-child{border-top:none}
.src{flex:none;font-size:.75rem;font-weight:700;color:var(--accent);
  min-width:5.2em}
.time{flex:none;margin-left:auto;font-size:.75rem;color:var(--muted);white-space:nowrap}
.toggle{font-size:.82rem;color:var(--muted);cursor:pointer;background:none;
  border:none;padding:4px 0;font-family:inherit}
.toggle:hover{color:var(--accent)}
#status{font-size:.78rem;color:var(--muted);margin-top:40px;
  border-top:1px solid var(--line);padding-top:14px}
#status .bad{color:var(--accent)}
.latest-item{padding:8px 0;border-bottom:1px dashed var(--line);font-size:.92rem;
  display:flex;gap:8px;align-items:baseline}
.empty{color:var(--muted);padding:30px 0;text-align:center}
footer{margin-top:30px;font-size:.78rem;color:var(--muted)}
</style>
</head>
<body>
<div class="wrap">
<header>
  <h1>時事懶人包</h1>
  <span class="sub">台灣熱門新聞事件・多家媒體視角</span>
</header>
<nav>
  <a href="index.html">最新</a>
  <a href="archive.html">歷史紀錄</a>
  <span id="updated"></span>
</nav>

<h2>熱門事件</h2>
<div id="tagbar"></div>
<div id="hot"></div>

<h2>其他即時新聞</h2>
<div id="latest"></div>

<div id="status"></div>
<footer>
  本站自動彙整各媒體公開 RSS 內容，標題與連結版權屬原媒體所有。
  事件排序依報導媒體數量，不代表任何立場。
</footer>
</div>

<script>
const fmt = iso => {
  const d = new Date(iso);
  const mm = String(d.getMonth()+1).padStart(2,"0");
  const dd = String(d.getDate()).padStart(2,"0");
  const hh = String(d.getHours()).padStart(2,"0");
  const mi = String(d.getMinutes()).padStart(2,"0");
  return `${mm}/${dd} ${hh}:${mi}`;
};
const esc = s => s.replace(/[&<>"']/g,
  c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));

function artLine(a){
  return `<li><span class="src">${esc(a.source_name)}</span>
    <a href="${esc(a.link)}" target="_blank" rel="noopener">${esc(a.title)}</a>
    <span class="time">${fmt(a.published)}</span></li>`;
}

function analysisBlock(a){
  if(!a || !a.sources) return "";
  const ref = r => {
    const s = a.sources[r];
    return s ? `<a class="ref" href="${esc(s.link)}" target="_blank"
      rel="noopener" title="${esc(s.name)}">[${r}]</a>` : "";
  };
  const refs = rs => (rs||[]).map(ref).join("");
  let html = `<div class="analysis">`;
  if(a.consensus && a.consensus.length){
    html += `<div class="an-sec"><span class="lbl">多方報導的事實</span>` +
      a.consensus.map(i => `<p>${esc(i.text)}${refs(i.refs)}</p>`).join("") +
      `</div>`;
  }
  if(a.disputes && a.disputes.length){
    html += `<div class="an-sec"><span class="lbl">⚠ 媒體說法分歧</span>` +
      a.disputes.map(d => `<p>${esc(d.topic)}：` +
        d.positions.map(p => `${esc(p.text)}${refs(p.refs)}`).join("；") +
        `</p>`).join("") + `</div>`;
  }
  if(a.single_source && a.single_source.length){
    html += `<div class="an-sec single"><span class="lbl">僅單一來源提及</span>` +
      a.single_source.map(i => `<p>${esc(i.text)}${refs(i.refs)}</p>`).join("") +
      `</div>`;
  }
  html += `</div>`;
  return html;
}

function claimsBlock(claims){
  if(!claims || !claims.length) return "";
  let html = "";
  const disc = claims.filter(c => !c.agree);
  if(disc.length){
    html += `<div class="claims warn"><span class="lbl">⚠ 數字歧異</span>` +
      disc.map(c => `${esc(c.type)}：` + c.values.map(v =>
        `${esc(v.value)}（${v.outlets.map(esc).join("、")}）`).join(" ／ ")
      ).join("；") +
      `<span class="hint">各媒體報導的數字不一致，可能為更新時間差或統計口徑不同，請點開原文查證。</span></div>`;
  }
  const ok = claims.filter(c => c.agree && c.outlet_count >= 3);
  if(ok.length){
    html += `<div class="claims ok"><span class="lbl">✓ 多方一致</span>` +
      ok.map(c =>
        `${esc(c.type)} ${esc(c.values[0].value)}（${c.outlet_count} 家媒體）`
      ).join("；") + `</div>`;
  }
  return html;
}

function eventCard(ev){
  const shown = ev.articles.slice(0,5), rest = ev.articles.slice(5);
  let html = `<div class="card">
    <h3>${esc(ev.title)}</h3>
    <div class="meta">
      <span class="badge">${ev.outlet_count} 家媒體・${ev.article_count} 篇報導</span>
      <span>首次出現 ${fmt(ev.first_seen)}</span>
      <span>最後更新 ${fmt(ev.last_updated)}</span>
      ${(ev.tags||[]).map(t =>
        `<span class="tag" data-tag="${esc(t)}">#${esc(t)}</span>`).join("")}
    </div>`;
  if(ev.analysis) html += analysisBlock(ev.analysis);
  else if(ev.summary) html += `<div class="summary">${esc(ev.summary)}</div>`;
  html += claimsBlock(ev.claims);
  html += `<ul class="arts">${shown.map(artLine).join("")}`;
  if(rest.length){
    html += `</ul><button class="toggle" data-n="${rest.length}">
      顯示其餘 ${rest.length} 篇 ▾</button>
      <ul class="arts" hidden>${rest.map(artLine).join("")}`;
  }
  html += `</ul></div>`;
  return html;
}

let hotEvents = [], selectedTag = null;

function tagMatch(ev, sel){
  return (ev.tags||[]).some(t => t.includes(sel) || sel.includes(t));
}

function renderHot(){
  const list = selectedTag
    ? hotEvents.filter(e => tagMatch(e, selectedTag)) : hotEvents;
  document.getElementById("hot").innerHTML = list.length
    ? list.map(eventCard).join("")
    : '<div class="empty">沒有符合這個標籤的事件。</div>';
  document.querySelectorAll("#hot .toggle").forEach(btn => {
    btn.addEventListener("click", () => {
      const ul = btn.nextElementSibling;
      ul.hidden = !ul.hidden;
      btn.textContent = ul.hidden
        ? `顯示其餘 ${btn.dataset.n} 篇 ▾` : "收合 ▴";
    });
  });
  document.querySelectorAll("#tagbar .chip").forEach(ch => {
    ch.classList.toggle("active",
      selectedTag ? ch.dataset.tag === selectedTag : !ch.dataset.tag);
  });
}

function selectTag(tag){
  selectedTag = (tag && tag !== selectedTag) ? tag : null;
  renderHot();
}

function renderTagbar(tags){
  const bar = document.getElementById("tagbar");
  if(!tags || !tags.length){ bar.hidden = true; return; }
  bar.innerHTML = `<button class="chip active">全部</button>` +
    tags.map(t => `<button class="chip" data-tag="${esc(t.tag)}">
      #${esc(t.tag)}<span class="n">${t.count}</span></button>`).join("");
}

document.addEventListener("click", e => {
  const chip = e.target.closest(".chip");
  if(chip){ selectTag(chip.dataset.tag || null); return; }
  const tag = e.target.closest(".tag");
  if(tag) selectTag(tag.dataset.tag);
});

async function main(){
  let data;
  try{
    data = await (await fetch("data/events.json?t="+Date.now())).json();
  }catch(e){
    document.getElementById("hot").innerHTML =
      '<div class="empty">資料尚未產生，請稍後再試。</div>';
    return;
  }
  document.getElementById("updated").textContent =
    data.generated_at ? "更新於 " + fmt(data.generated_at) : "";

  hotEvents = data.events.filter(e => e.outlet_count >= 2);
  renderTagbar(data.tags);
  renderHot();

  const hotLinks = new Set(hotEvents.flatMap(e => e.articles.map(a => a.link)));
  const latest = (data.latest||[]).filter(a => !hotLinks.has(a.link)).slice(0,20);
  document.getElementById("latest").innerHTML = latest.length
    ? `<div class="card">${latest.map(a =>
        `<div class="latest-item"><span class="src">${esc(a.source_name)}</span>
         <a href="${esc(a.link)}" target="_blank" rel="noopener">${esc(a.title)}</a>
         <span class="time">${fmt(a.published)}</span></div>`).join("")}</div>`
    : '<div class="empty">暫無資料。</div>';

  try{
    const st = await (await fetch("data/status.json?t="+Date.now())).json();
    document.getElementById("status").innerHTML = "來源狀態：" +
      st.sources.map(s =>
        `<span class="${s.ok?'':'bad'}">${esc(s.name)} ${s.ok?'✓':'✗'}${s.via_fallback?'*':''}</span>`
      ).join("　") +
      "<br>* 表示該媒體 RSS 暫時無法讀取，改由 Google News 取得。";
  }catch(e){/* status 選用 */}
}
main();
</script>
</body>
</html>
